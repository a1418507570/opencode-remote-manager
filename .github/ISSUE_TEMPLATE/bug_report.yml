name: Bug report
description: Report a reproducible problem in OpenCode Remote Manager
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Please include a minimal reproduction and enough environment detail for us to understand whether the problem is local, remote, or release-related.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: Tell us what you expected and what actually happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest sequence that reproduces the issue.
      placeholder: |
        1. Open the menu bar app
        2. Start the go connection
        3. Open OpenCode Desktop
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or diagnostics
      description: Paste relevant logs, screenshots, or CLI diagnostics such as `swift run OpenCodeRemoteManagerCLI diagnose --json`.
      render: shell
  - type: input
    id: version
    attributes:
      label: App or release version
      description: For example `v0.1.0`
      placeholder: v0.1.0
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 14.5
  - type: textarea
    id: environment
    attributes:
      label: Remote environment details
      description: Include remote setup details that matter, such as whether the issue affects one remote or both.
      placeholder: go only / java only / both, remote opencode version, SSH context, etc.
